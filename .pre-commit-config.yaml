repos:
  - repo: local
    hooks:
      - id: black
        name: black
        entry: black
        language: system
        types: [python]

      - id: isort
        name: isort
        entry: isort
        language: system
        types: [python]
        args: ["--profile=black"]

      - id: flake8
        name: flake8
        entry: flake8
        language: system
        types: [python]
        args: ["--max-line-length=120", "--exclude=.penv,__pycache__"]

      - id: mypy
        name: mypy
        entry: mypy
        language: system
        types: [python]

      - id: pylint
        name: pylint
        entry: pylint
        language: system
        types: [python]
        args: ["--disable=C0114,C0115,C0116,R0903"]
